# Nginx Gateway Configuration for SSL

# 1. 抽籤系統 - http (驗證用)
server {
    listen 80;
    server_name www.chou-chian-sys.it.com chou-chian-sys.it.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend-chou-cian:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. 電商系統 - http (驗證用)
server {
    listen 80;
    server_name www.water-mare-shop.it.com water-mare-shop.it.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend-vue-shop:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

