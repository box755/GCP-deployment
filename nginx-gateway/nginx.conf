# Nginx Gateway Configuration for SSL (HTTPS 最終版本)

# --- 1. 抽籤系統 ---

# HTTP 轉 HTTPS
server {
    listen 80;
    server_name www.chou-chian-sys.it.com chou-chian-sys.it.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name www.chou-chian-sys.it.com chou-chian-sys.it.com;

    ssl_certificate /etc/letsencrypt/live/www.chou-chian-sys.it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.chou-chian-sys.it.com/privkey.pem;

    # SSL 安全設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend-chou-cian:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

